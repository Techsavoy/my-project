<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Cartoon Animation</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        
        /* The Environment */
        .sun {
            position: absolute; top: 50px; right: 50px;
            width: 80px; height: 80px;
            background: #FFD700; border-radius: 50%;
            box-shadow: 0 0 20px #FFA500;
            animation: glow 3s infinite alternate;
        }
        @keyframes glow { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .grass {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            background: #228B22; z-index: 1;
        }

        /* The Character */
        .character {
            position: absolute; bottom: 120px; left: -100px;
            width: 80px; height: 80px;
            background: #FFDAB9; border-radius: 50%;
            border: 3px solid #333; z-index: 2;
            transition: transform 0.1s;
        }
        .eye {
            position: absolute; top: 25px; width: 8px; height: 8px;
            background: #000; border-radius: 50%;
        }
        .eye.left { left: 20px; } .eye.right { right: 20px; }
        .mouth {
            position: absolute; bottom: 15px; left: 25px;
            width: 30px; height: 15px;
            border-bottom: 4px solid #000; border-radius: 0 0 15px 15px;
        }
    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="character" id="walker">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
    </div>
    <div class="grass"></div>

    <script>
        const walker = document.getElementById('walker');
        let posX = -100;

        function animate() {
            // 1. Move horizontally across the screen
            posX += 2;
            if (posX > window.innerWidth) posX = -100;
            walker.style.left = posX + 'px';

            // 2. Create a "bouncing" walk effect using sine waves
            let bounce = Math.abs(Math.sin(Date.now() / 200)) * 40;
            walker.style.bottom = (120 + bounce) + 'px';

            requestAnimationFrame(animate);
        }

        // Interaction: Click to "squish" the character
        window.addEventListener('mousedown', () => walker.style.transform = 'scale(1.2, 0.8)');
        window.addEventListener('mouseup', () => walker.style.transform = 'scale(1, 1)');

        animate();
    </script>
</body>
</html>
